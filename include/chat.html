<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="chat.css">
</head>
<body>
    <div id="comment-main">
        <div class="header-container">
            <h3 style="display: flex !important; align-items: center !important;">
                <a href="https://nostrurl.github.io/base/" target="_blank">
                    <img id="header-icon" style="height: 1.4em !important; width: auto !important; margin-right: 6px !important; vertical-align: middle !important;">
                </a>
                Nostrurl
            </h3>
            <div class="header-right-box" style="display: flex !important; flex-direction: row !important; align-items: center !important; gap: 10px !important;">
                <!-- バージョン情報 -->
                <div class="version-info" style="font-size: 12px !important; color: #888 !important; user-select: none !important; line-height: 1 !important; margin-top: 2px !important;"></div>
                
                <!-- 📜 マニュアルボタン -->
                <button id="manual-btn" title="マニュアル" style="background: none !important; border: none !important; cursor: pointer !important; padding: 0 !important; font-size: 16px !important; line-height: 1 !important;">📜</button>
                
                <!-- ⚙️ ライブ設定ボタン -->
                <button id="config-btn" title="ライブ設定" style="background: none !important; border: none !important; cursor: pointer !important; padding: 0 !important; font-size: 16px !important; line-height: 1 !important;">⚙️</button>
            </div>
        </div>
        
        <div class="meta-line">
            <span id="connection-status">⏳ リレー接続確認中...</span>: <span id="display-key" style="color: #b388ff !important;">Loading...</span>
        </div>

        <!-- チャットコメント表示エリア -->
        <div id="comments">Loading comments...</div>

        <!-- ここにuser.js経由で config.html と manual.html を自動挿入 -->

        <!-- 投稿フォームエリア -->
        <textarea id="input" placeholder="ここに入力... (Ctrl+Enterで送信)"></textarea>
        <button id="send">投稿する</button>
    </div>
</body>
</html>
